<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./build/icon.ico?v=__FAVICON_VERSION__" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas</title>
    <meta property="og:title" content="Atlas" />
    <meta property="og:description" content="Voxel-based world editor built with React and Three.js" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <script>
      const USE_MONOCRAFT_FONT = false;
      document.documentElement.dataset.atlasFont = USE_MONOCRAFT_FONT ? 'monocraft' : 'default';

      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              minecraft: ['var(--atlas-minecraft-font-family)'],
              sans: ['var(--atlas-ui-font-family)'],
              mono: ['var(--atlas-mono-font-family)'],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: 'Monocraft';
        src:
          local('Monocraft'),
          local('Monocraft-Regular'),
          url('./assets/fonts/Monocraft-ttf/Monocraft.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Italic.ttf') format('truetype');
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-ExtraLight.ttf') format('truetype');
        font-weight: 200;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-ExtraLight-Italic.ttf') format('truetype');
        font-weight: 200;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Light.ttf') format('truetype');
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Light-Italic.ttf') format('truetype');
        font-weight: 300;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-SemiBold.ttf') format('truetype');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-SemiBold-Italic.ttf') format('truetype');
        font-weight: 600;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Bold-Italic.ttf') format('truetype');
        font-weight: 700;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Black.ttf') format('truetype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Monocraft';
        src: url('./assets/fonts/Monocraft-ttf/weights/Monocraft-Black-Italic.ttf') format('truetype');
        font-weight: 900;
        font-style: italic;
        font-display: swap;
      }
      :root {
        --atlas-ui-font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --atlas-mono-font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        --atlas-minecraft-font-family: var(--atlas-ui-font-family);
      }
      :root[data-atlas-font='monocraft'] {
        --atlas-ui-font-family: 'Monocraft', monospace;
        --atlas-mono-font-family: 'Monocraft', monospace;
        --atlas-minecraft-font-family: 'Monocraft', monospace;
      }
      body, html, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #87CEEB; /* Sky blue */
        font-family: var(--atlas-ui-font-family);
        font-synthesis: none;
        user-select: none;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 50;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
